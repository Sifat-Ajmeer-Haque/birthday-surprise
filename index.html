<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sagor!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 1. Logo Section */
        #logo-screen {
            text-align: center;
            animation: fadeOut 2s forwards 3s;
        }

        .logo {
            font-size: 5rem;
            font-weight: bold;
            color: #ff4500;
            text-shadow: 0 0 20px #ffea00, 2px 2px 5px #000;
            letter-spacing: 5px;
        }

        /* 2. Main Content (Car & Celebrities) */
        #main-content {
            opacity: 0;
            display: none;
            text-align: center;
            animation: fadeIn 3s forwards;
        }

        .celebrity-photo {
            max-width: 80%;
            border: 5px solid #fff;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.5);
        }

        /* 3. Surprise Button */
        #surprise-btn {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 1.5rem;
            background: linear-gradient(45deg, #ff0000, #ff8c00);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 69, 0, 0.4);
            transition: transform 0.3s;
            display: none;
        }

        #surprise-btn:hover {
            transform: scale(1.1);
        }

        /* 4. Video Player */
        #video-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 100;
        }

        video {
            width: 100%;
            height: 100%;
        }

        /* Animations */
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; visibility: hidden; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="logo-screen">
        <h1 class="logo">AAGUN-ER TUFAN</h1>
        <p>A Sagor Ahmed Production</p>
    </div>

    <div id="main-content">
        <img src="your-celebrity-car-photo.jpg" alt="Sagor with World Leaders" class="celebrity-photo">
        <br>
        <button id="surprise-btn">CLICK FOR A SURPRISE! 🎁</button>
    </div>

    <div id="video-container">
        <video id="birthday-video" controls>
            <source src="your-video-file.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <audio id="bg-music" loop>
        <source src="your-music-file.mp3" type="audio/mpeg">
    </audio>

    <script>
        const logoScreen = document.getElementById('logo-screen');
        const mainContent = document.getElementById('main-content');
        const surpriseBtn = document.getElementById('surprise-btn');
        const videoContainer = document.getElementById('video-container');
        const video = document.getElementById('birthday-video');
        const music = document.getElementById('bg-music');

        // Start the sequence
        window.addEventListener('load', () => {
            // Auto-play music (Browser might block this, so we trigger it on first click)
            document.body.addEventListener('click', () => {
                music.play();
            }, { once: true });

            // Transition from Logo to Main Content after 4 seconds
            setTimeout(() => {
                logoScreen.style.display = 'none';
                mainContent.style.display = 'block';
                
                // Show surprise button after another 3 seconds
                setTimeout(() => {
                    surpriseBtn.style.display = 'inline-block';
                }, 3000);
            }, 5000);
        });

        // Surprise Button Action
        surpriseBtn.addEventListener('click', () => {
            music.pause(); // Stop the funk track
            videoContainer.style.display = 'block';
            video.play();
        });
    </script>
</body>
</html>
